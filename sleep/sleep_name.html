<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sleep solution enter name</title>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="simmons" />
    <meta
      property="og:description"
      content="A refined sleep experience shaped by heritage, innovation, and lasting comfort."
    />
    <meta property="og:url" content="https://yshnada-del.github.io/simmons/" />
    <meta
      property="og:image"
      content="https://yshnada-del.github.io/simmons/img/og.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="We aimed to convey Simmons’ “unshakable comfort” through simple, impactful imagery."
    />
    <meta property="og:site_name" content="simmons" />
    <link rel="icon" href="../simmons_favicon_io/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../simmons_favicon_io/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../simmons_favicon_io/apple-touch-icon.png"
    />
    <!-- 폰트4개  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />

    <!-- common -> 헤더, reset -> 기본값 -->
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="css/style_sleep_name.css" />

    <!-- js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <!-- 나의 js -->
    <script src="js/main_sleep.js"></script>
    <script src="js/sleep_name.js"></script>
  </head>

  <body class="name_page_body">
    <div class="inner_wrap name_page_inner">
      <h1 class="main_title">Let's Get Started</h1>
      <div class="name_contents">
        <div class="content_inner">
          <!-- 0. Center Line Added -->
          <div class="line_center"></div>

          <!-- 1. Tit Section -->
          <div class="tit_box">
            <h2>SIMMONS</h2>
            <span class="personalized_stamp" aria-hidden="true"
              >PERSONALIZED</span
            >
            <div class="line_dashed"></div>
            <p>Step 01 / Profile Setup</p>
          </div>

          <!-- 2. Tit2 Section -->
          <div class="tit2_box">
            <h2>What should we call you?</h2>
            <p>
              Every exceptional sleep experience starts with<br />understanding
              who you are
            </p>
          </div>

          <!-- Separation Line -->
          <div class="line_full"></div>

          <!-- 3. Input Section -->
          <div class="input_box">
            <span class="q_name">YOUR FIRST NAME</span>
            <input type="text" class="enter_name" placeholder=" " />
            <span class="enter_name_hint" aria-hidden="true"
              >Enter here...</span
            >
          </div>

          <!-- 4. Footer Section -->
          <div class="footer_box">
            <img src="../img/sleep_code02.png" alt="barcode" class="code_img" />
            <p class="code_txt">SLP-2026-001</p>
          </div>

          <!-- 5. Button -->
          <div class="start_btn_link_wrap">
            <a href="sleep_main.html" class="back_btn_link" data-fallback-href="sleep_main.html">
              <div class="start_btn back_btn">
                <img
                  src="../icon/arrow-right.svg"
                  alt="back"
                  class="btn_icon btn_icon_left"
                />
                <span>Back</span>
              </div>
            </a>
            <a
              href="sleep_ox.html"
              class="start_btn_link is-disabled"
              aria-disabled="true"
              tabindex="-1"
            >
              <div class="start_btn">
                <span>Continue</span>
                <img
                  src="../icon/arrow-right.svg"
                  alt="arrow"
                  class="btn_icon"
                />
              </div>
            </a>
          </div>
        </div>
      </div>
      <!-- 6. Extra Divider -->
      <div class="bottom_divider"></div>
    </div>
  </body>
</html>
